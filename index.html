<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css"/>

        <title>Mi Red Social</title>
    </head>

    <body>
        <header>
            <h1>Mi Red Social</h1>
        </header>

        <main>
            <img id="foto-perfil" src="https://media.giphy.com/media/nfUjyH2ad4lBti0Fv0/giphy-downsized-large.gif" alt="Perfil">

            <p id="nombre-perfil">Panda</p>

            <h2>Mis publicaciones</h2>

            <div class="posteo">
                <h3>Tarde de cine</h3>
                <img src="https://media.giphy.com/media/UoLt6Tm8wlSnWGfSFs/giphy.gif" alt="Cine">
                <p>Disfruté una gran tarde viendo películas con mis amigos.</p>
            </div>

            <div class="posteo">
                <h3>Paseo al parque</h3>
                <img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif" alt="Parque">
                <p>Hoy salí a caminar y disfrutar del aire libre.</p>
            </div>

            <div class="anuncio">
                <h3>Anuncio: Celular nuevo</h3>
                <img src="https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif" alt="Celular">
                <p>¡Oferta especial! Consigue tu nuevo celular con descuento.</p>
            </div>
        </main>

        <footer>
            <p>Todos los derechos reservados</p>
        </footer>
    </body>
</html>
